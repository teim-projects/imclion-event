<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Success - Welcome!</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        .success-container {
            text-align: center;
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(16px);
            padding: 70px 50px;
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.25);
            max-width: 460px;
            width: 92%;
            border: 1px solid rgba(255, 255, 255, 0.25);
            animation: fadeInScale 0.8s ease forwards;
        }

        @keyframes fadeInScale {
            from { opacity: 0; transform: scale(0.7); }
            to { opacity: 1; transform: scale(1); }
        }

        .icon-circle {
            width: 110px;
            height: 110px;
            background: rgba(255, 255, 255, 0.95);
            color: #2575fc;
            font-size: 4.5rem;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            animation: popIn 0.7s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes popIn {
            0% { transform: scale(0.3); }
            60% { transform: scale(1.15); }
            100% { transform: scale(1); }
        }

        h1 {
            font-size: 2.6rem;
            font-weight: 700;
            margin-bottom: 12px;
            color: white;
        }

        p {
            font-size: 1.15rem;
            opacity: 0.95;
            line-height: 1.6;
            margin-bottom: 40px;
            color: rgba(255, 255, 255, 0.9);
        }

        .btn {
            display: inline-block;
            padding: 16px 48px;
            background: white;
            color: #2575fc;
            font-size: 1.15rem;
            font-weight: 600;
            text-decoration: none;
            border-radius: 50px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            transition: all 0.4s ease;
        }

        .btn:hover {
            transform: translateY(-6px) scale(1.05);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.25);
            background: #f8f9ff;
        }

        .sparkles {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
        }
    </style>
</head>
<body>

    <div class="success-container">
        <div class="icon-circle">✅</div>
        <h1>Registration Successful!</h1>
        <p>Your form has been submitted successfully.<br>Welcome to our community!</p>
        
        <a href="/" class="btn">Back to Home</a>
    </div>

    <!-- Sparkle / Particle Background -->
    <canvas class="sparkles" id="sparkles"></canvas>

    <script>
        const canvas = document.getElementById('sparkles');
        const ctx = canvas.getContext('2d');
        
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        const particles = [];
        const colors = ['#ffffff', '#ffd700', '#a5b4fc', '#c084fc'];

        class Sparkle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 5 + 2;
                this.speedX = Math.random() * 2 - 1;
                this.speedY = Math.random() * 2 - 1.5;
                this.opacity = Math.random() * 0.8 + 0.4;
                this.color = colors[Math.floor(Math.random() * colors.length)];
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                this.opacity -= 0.008;
                if (this.opacity <= 0) {
                    this.x = Math.random() * canvas.width;
                    this.y = Math.random() * canvas.height * 0.3;
                    this.opacity = Math.random() * 0.8 + 0.5;
                }
            }
            draw() {
                ctx.save();
                ctx.globalAlpha = this.opacity;
                ctx.fillStyle = this.color;
                ctx.shadowBlur = 15;
                ctx.shadowColor = this.color;
                ctx.fillRect(this.x, this.y, this.size, this.size);
                ctx.restore();
            }
        }

        for (let i = 0; i < 120; i++) {
            particles.push(new Sparkle());
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < particles.length; i++) {
                particles[i].update();
                particles[i].draw();
            }
            requestAnimationFrame(animate);
        }

        animate();
    </script>

</body>
</html>
